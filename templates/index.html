<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steel Scratch Detector | precision AI</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="subtitle">Industrial Quality Control</div>
        <h1>Steel Scratch Detector</h1>
        <p style="color: #94a3b8">
          High-precision surface defect segmentation using ResUNet++ with
          Attention
        </p>
      </header>

      <section class="main-card">
        <div class="upload-section">
          <div class="dropzone" id="dropzone">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>
              Drag and drop steel image or
              <span style="color: var(--primary); font-weight: 600"
                >browse</span
              >
            </p>
            <input type="file" id="file-input" accept="image/*" />
          </div>
          <button class="btn btn-primary" id="predict-btn" disabled>
            <i class="fa-solid fa-bolt" style="margin-right: 8px"></i>Analyze
            Surface
          </button>
          <div class="loader" id="loader"></div>
        </div>
      </section>

      <section class="results-container" id="results-section">
        <div class="result-image-card">
          <span class="image-label">Detection Overlay</span>
          <img id="processed-img" src="" alt="Processed result" />
        </div>
        <div class="metrics-card">
          <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem">
            Defect Report
          </h3>
          <div id="defect-list">
            <!-- Metrics will be injected here -->
          </div>
        </div>
      </section>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
